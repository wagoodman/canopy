
version: "3"

includes:
  tools: taskfile.d/tools.yaml

vars:
  OWNER: wagoodman
  PROJECT: canopy

  # static file dirs
  TOOL_DIR: .tool
  TMP_DIR: .tmp

  # used for changelog generation
  CHANGELOG: CHANGELOG.md
  NEXT_VERSION: VERSION

  # tools
  CHRONICLE: "{{ .TOOL_DIR }}/chronicle"
  GLOW: "{{ .TOOL_DIR }}/glow"
  BOUNCER: "{{ .TOOL_DIR }}/bouncer"
  GOIMPORTS: "{{ .TOOL_DIR }}/gosimports"
  GOLANGCILINT: "{{ .TOOL_DIR }}/golangci-lint"
  GORELEASER: "{{ .TOOL_DIR }}/goreleaser"
  CANOPY: "{{ .TOOL_DIR }}/canopy"

  # used for snapshot builds
  OS:
    sh: uname -s | tr '[:upper:]' '[:lower:]'
  ARCH:
    sh: |
      [ "$(uname -m)" = "x86_64" ] && echo "amd64_v1" || echo $(uname -m)
  PROJECT_ROOT:
    sh: git rev-parse --show-toplevel

  # note: the snapshot dir must be a relative path starting with ./
  SNAPSHOT_DIR: ./snapshot
  SNAPSHOT_BIN: "{{ .PROJECT_ROOT }}/{{ .SNAPSHOT_DIR }}/{{ .OS }}-build_{{ .OS }}_{{ .ARCH }}/{{ .PROJECT }}"
  SNAPSHOT_CMD: "{{ .GORELEASER }} release --config {{ .TMP_DIR }}/goreleaser.yaml --clean --snapshot --skip=publish --skip=sign"
  BUILD_CMD:    "{{ .GORELEASER }} build   --config {{ .TMP_DIR }}/goreleaser.yaml --clean --snapshot --single-target"
  RELEASE_CMD:  "{{ .GORELEASER }} release --clean --release-notes {{ .CHANGELOG }}"
  VERSION:
    sh: git describe --dirty --always --tags

env:
  GNUMAKEFLAGS: '--no-print-directory'

tasks:

  ## High-level tasks #################################

  default:
    desc: Run all validation tasks
    cmds:
      - task: static-analysis
      - task: test

  static-analysis:
    desc: Run all static analysis tasks
    cmds:
      - task: lint
      - task: check-licenses

  test:
    desc: Run all levels of test
    cmds:
      - task: unit

  ## Bootstrap tasks #################################
  # tool management lives under the "tools" namespace (see taskfile.d/tools.yaml):
  #   task tools           install all tools (alias: tools:install)
  #   task tools:update    update pinned tool versions
  #   task tools:list      list tools
  #   task tools:list:updates  list out-of-date tools

  tmpdir:
    silent: true
    internal: true
    generates:
      - "{{ .TMP_DIR }}"
    cmd: "mkdir -p {{ .TMP_DIR }}"

  ## Static analysis tasks #################################

  format:
    desc: Auto-format all source code
    deps: [tools:install]
    cmds:
      - gofmt -w -s .
      - "{{ .GOIMPORTS }} -local github.com/anchore -w ."
      - go mod tidy

  lint-fix:
    desc: Auto-format all source code + run golangci lint fixers
    deps: [tools:install]
    cmds:
      - task: format
      - "{{ .GOLANGCILINT }} run --tests=false --fix"

  lint:
    desc: Run code format + lint checks
    vars:
      BAD_FMT_FILES:
        sh: gofmt -l -s .
      BAD_FILE_NAMES:
        sh: "find . | grep -e ':' || true"
    deps: [tools:install]
    cmds:
      # ensure there are no go fmt differences
      - cmd: 'test -z "{{ .BAD_FMT_FILES }}" || (echo "files with gofmt issues: [{{ .BAD_FMT_FILES }}]"; exit 1)'
        silent: true
      # ensure there are no files with ":" in it (a known back case in the go ecosystem)
      - cmd: 'test -z "{{ .BAD_FILE_NAMES }}" || (echo "files with bad names: [{{ .BAD_FILE_NAMES }}]"; exit 1)'
        silent: true
      # run linting
      - "{{ .GOLANGCILINT }} run --tests=false"
      - go mod tidy --diff

  check-licenses:
    # desc: Ensure transitive dependencies are compliant with the current license policy
    deps: [tools:install]
    cmd: "{{ .BOUNCER }} check ./..."


  ## Testing tasks #################################

  unit:
    deps: [tools:install]
    desc: Run unit tests
    vars:
      TEST_ARGS: ./cmd/...
    silent: true
    cmds:
      - |
        if [ "$USE_GO_TEST" = "true" ]; then
          go test {{ .TEST_ARGS }}
        else
          {{ .CANOPY }} test {{ .TEST_ARGS }}
        fi

  demo:
    deps: [tools:install]
    desc: Run demo tests
    silent: true
    vars:
      TEST_ARGS: ./internal/test-fixtures/...
    env:
      # make this a little nicer in CI to see colors
      FORCE_COLOR: "true"
    # we don't want to fail, only run the tests and show what it looks like in CI
    cmd: |
      if [ "$VERBOSE" = "true" ]; then
        {{ .CANOPY }} test {{ .TEST_ARGS }} -v || true
      else
        {{ .CANOPY }} test {{ .TEST_ARGS }} || true
      fi

  ## Build-related targets #################################

  goreleaser-config:
    internal: true
    deps: [tmpdir]
    requires:
      vars: [DIST]
    # goreleaser v2 has no --dist flag, so we prepend the dist dir to a temp copy of the config
    silent: true
    cmd: |
      echo "dist: {{ .DIST }}" > {{ .TMP_DIR }}/goreleaser.yaml
      cat .goreleaser.yaml >> {{ .TMP_DIR }}/goreleaser.yaml

  build:
    desc: Build the project
    deps: [tools:install]
    generates:
      - "{{ .PROJECT }}"
    cmds:
      - task: goreleaser-config
        vars: { DIST: "{{ .SNAPSHOT_DIR }}" }
      - "{{ .BUILD_CMD }}"

  snapshot:
    desc: Create a snapshot release
    aliases:
      - build
    deps: [tools:install]
    sources:
      - cmd/**/*.go
    method: checksum
    generates:
      - "{{ .SNAPSHOT_BIN }}"
    cmds:
      - task: goreleaser-config
        vars: { DIST: "{{ .SNAPSHOT_DIR }}" }
      - "{{ .SNAPSHOT_CMD }}"

  changelog:
    desc: Generate a changelog
    deps: [tools:install]
    generates:
      - "{{ .CHANGELOG }}"
      - "{{ .NEXT_VERSION }}"
    cmds:
      - "{{ .CHRONICLE }} -vv -n --version-file {{ .NEXT_VERSION }} > {{ .CHANGELOG }}"
      - "{{ .GLOW }} {{ .CHANGELOG }}"


  ## Release targets #################################

  release:
    desc: Create a release
    interactive: true
    deps: [tools:install]
    cmds:
      - cmd: .github/scripts/trigger-release.sh
        silent: true


  ## CI-only targets #################################

  ci-check:
    silent: true
    cmds:
      - |
        # assert we are running in CI (or die!)
        if [[ -z "$CI" ]]; then
            echo "This step should ONLY be run in CI. Exiting..."
            exit 1
        fi

  ci-release:
    # desc: "[CI only] Create a release"
    deps: [tools:install]
    cmds:
      - task: ci-check
      - "{{ .CHRONICLE }} -vvv > CHANGELOG.md"
      - cmd: "cat {{ .CHANGELOG }}"
        silent: true
      - "{{ .RELEASE_CMD }}"
