name: "Release"

permissions: {}

concurrency:
  group: release
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      version:
        description: tag the latest commit on main with the given version (prefixed with v)
        required: true
      skip-checks:
        description: skip the check-gate (release even if checks haven't passed on main)
        type: boolean
        default: false
        required: false

run-name: ${{ github.event.inputs.version }}

jobs:
  version-available:
    permissions:
      contents: read # required for the reusable workflow to check out the repo and verify the version
    uses: anchore/workflows/.github/workflows/check-version-available.yaml@7212994dc8fc3a53fe9c8e766ab5b4ddd16ea3d4 # v0.8.0
    with:
      version: ${{ github.event.inputs.version }}

  check-gate:
    if: ${{ !inputs.skip-checks }}
    permissions:
      checks: read # required for getting the status of specific check names
      contents: read
    uses: anchore/workflows/.github/workflows/check-gate.yaml@7212994dc8fc3a53fe9c8e766ab5b4ddd16ea3d4 # v0.8.0
    with:
      # these are checks that should be run on pull-request and merges to main.
      # we do NOT want to kick off a release if these have not been verified on main.
      # Please see the validations.yaml workflow for the names that should be used here.
      checks: '["Build snapshot artifacts", "Static Analysis", "Unit Tests (use-go-test: true)", "Unit Tests (use-go-test: false)"]'

  release:
    needs: [check-gate, version-available]
    if: >-
      ${{ always()
          && needs.version-available.result == 'success'
          && !contains(fromJSON('["failure", "cancelled"]'), needs.check-gate.result) }}
    environment: release
    runs-on: ubuntu-24.04
    permissions:
      contents: write # required for creating the GitHub release and pushing the version tag
      packages: write # required for publishing release artifacts to GitHub packages
      id-token: write # required for keyless cosign signing via Github Actions OIDC
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0 # we need the full history to reason about changelogs and tags
          # persist credentials so we can push the version tag below using the default GITHUB_TOKEN
          persist-credentials: true

      - name: Bootstrap environment
        uses: ./.github/actions/bootstrap

      - name: Tag release
        # tagging is done here (not via a separate deploy key / TAG_TOKEN secret); the default GITHUB_TOKEN
        # persisted by checkout has the contents:write permission needed to push the tag.
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          git tag "$VERSION"
          git push origin "$VERSION"

      - name: Build & publish release artifacts
        run: make ci-release
        env:
          # for creating the release (requires write access to packages and content)
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: artifacts
          path: dist/**/*
