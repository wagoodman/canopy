name: "Validations"

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_COLOR: true

jobs:

  static-analysis:
    # Note: changing this job name requires making the same update in the .github/workflows/release.yaml pipeline
    name: "Static Analysis"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Bootstrap environment
        uses: ./.github/actions/bootstrap

      - name: Run
        run: make static-analysis

  unit-tests:
    name: "Unit Tests (use-go-test: ${{ matrix.use-go-test }})"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        use-go-test: [true, false]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Bootstrap environment
        uses: ./.github/actions/bootstrap

      - name: Run
        run: "make unit"
        env:
          USE_GO_TEST: ${{ matrix.use-go-test }}

  demo:
    name: "Demo Tests (verbose: ${{ matrix.verbose }})"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        verbose: [true, false]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Bootstrap environment
        uses: ./.github/actions/bootstrap

      - name: Run
        run: make demo
        env:
          VERBOSE: ${{ matrix.verbose }}
